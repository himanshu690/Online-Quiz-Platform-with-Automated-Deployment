spring.datasource.url=jdbc:postgresql://db:5432/quizdb
    spring.datasource.username=postgres
    spring.datasource.password=password
    spring.jpa.hibernate.ddl-auto=update
    ```
3.  **Create Core Components:** Create your JPA Entities (`User`, `Question`, `Quiz`), Repositories, and REST Controllers to handle CRUD operations and test submissions.
4.  **Write Unit Tests:** Ensure you have JUnit tests in `backend/src/test/java` to validate score calculations. Maven will run these during the CI pipeline.

### Phase 3: Frontend Development (React/Vite)

1.  **Initialize Frontend:**
    ```bash
    npm create vite@latest frontend -- --template react
    cd frontend
    npm install
    ```
2.  **Build UI:** Create components for Admin (Quiz Creation) and Student (Test Taking). Use `fetch` or `axios` to communicate with your Spring Boot backend REST APIs.

### Phase 4: Containerization (Docker)

1.  **Backend Dockerfile:** Create `backend/Dockerfile`:
    
```dockerfile
    FROM eclipse-temurin:17-jdk-alpine
    VOLUME /tmp
    COPY target/*.jar app.jar
    ENTRYPOINT ["java","-jar","/app.jar"]
    ```
2.  **Frontend Dockerfile:** Create `frontend/Dockerfile`:
    
```dockerfile
    FROM node:18-alpine AS build
    WORKDIR /app
    COPY package*.json ./
    RUN npm install
    COPY . .
    RUN npm run build
    
    FROM nginx:alpine
    COPY --from=build /app/dist /usr/share/nginx/html
    EXPOSE 80
    ```
3.  **Docker Compose:** Create `docker-compose.yml` in the root directory to orchestrate the application and database:
    
```yaml
    version: '3.8'
    services:
      db:
        image: postgres:13
        environment:
          POSTGRES_DB: quizdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - "5432:5432"
      backend:
        build: ./backend
        ports:
          - "8080:8080"
        depends_on:
          - db
      frontend:
        build: ./frontend
        ports:
          - "80:80"
        depends_on:
          - backend
    ```

### Phase 5: CI/CD Automation (Jenkins)

1.  **Jenkins Setup:** Install Jenkins and necessary plugins (Git, Docker Pipeline, Maven Integration).
2.  **Create Jenkinsfile:** Add a `Jenkinsfile` to the root of your repository:
    
```groovy
    pipeline {
        agent any
        stages {
            stage('Build & Test Backend') {
                steps {
                    dir('backend') {
                        sh 'mvn clean package'
                    }
                }
            }
            stage('Deploy with Docker Compose') {
                steps {
                    sh 'docker-compose down'
                    sh 'docker-compose up -d --build'
                }
            }
        }
    }
    ```
3.  **Configure Webhook:** 
    *   In Jenkins, create a new Pipeline job and point it to your GitHub repository.
    *   Check "GitHub hook trigger for GITScm polling".
    *   In your GitHub repository settings, go to Webhooks -> Add Webhook. Point the payload URL to your Jenkins server (`http://<your-jenkins-ip>:8080/github-webhook/`).

### Phase 6: Deployment

1.  Commit all changes and push to GitHub:
    
```bash
    git add .
    git commit -m "Initial commit with Docker and Jenkinsfile"
    git push origin main
    ```
2.  The push will automatically trigger Jenkins to pull the code, run Maven tests, build the Docker images, and deploy the application via Docker Compose.